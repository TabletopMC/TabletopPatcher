name: Build plugin and test project

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: oracle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: ./gradlew :plugin:build

      - name: Run plugin tests
        run: ./gradlew :plugin:test

      - name: Build test project
        run: ./gradlew :test-project:build

      - name: Build test project for Paper
        run: ./gradlew :test-project:buildForPaper
