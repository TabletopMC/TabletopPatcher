name: Publish

on:
  push:
    tags: [ "v*" ]

jobs:
  publish:
    name: Publish to Eldonexus
    runs-on: ubuntu-latest
    environment: publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: oracle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Get tag version
        id: tag
        #language=bash
        run: |
          raw=${{ github.ref_name }}
          echo "version=${raw:1}" >> $GITHUB_OUTPUT

      - name: Publish
        run: ./gradlew :plugin:publishToEldonexus -P${{ steps.tag.outputs.version }}
        env:
          NEXUS_USERNAME: "${{ secrets.NEXUS_USERNAME }}"
          NEXUS_PASSWORD: "${{ secrets.NEXUS_PASSWORD }}"
